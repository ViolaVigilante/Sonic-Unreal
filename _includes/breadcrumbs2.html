<!-- This code is for the sidebar version of the breadcrumbs. For the original version which displayed in a static box at the top of the page, see breadcrumbs.html -->

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button1"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button2"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button3"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button4"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button5"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button6"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center; padding-bottom: 15px;">
        <div id="Button7"></div>
      </div>
    </div>
    <div class="row">
      <div class="col" style="display: flex; justify-content: center">
        <div id="Button8"></div>
      </div>
    </div>
  </div> 

  <script>
    let breadcrumbList = JSON.parse(localStorage.getItem("storedBreadcrumbList")) || [];

    // Initialize array with placeholder key-value pair (needed for the page refresh check below to work, not sure why)
    var placeholder_present = false;
    if (breadcrumbList.length === 0) {
      breadcrumbList.push(["placeholder_key","placeholder_value"]);
      var placeholder_present = true;
    };

    // Set Liquid variables as JS variables 
    const pageTitle = "{{ page.title | escape }}";
    const pagePermalink = "/Sonic-Unreal{{ page.permalink | escape }}";

    // Check for page refresh (is this page the same as the last page that was visited?)
    const previousPageLog = breadcrumbList[breadcrumbList.length - 1];
    const previousPageName = previousPageLog[0];

    // Remove placeholder key-value pair, if present
    if (placeholder_present == true) {
      breadcrumbList.shift();
    };

    // Iterate through list to ensure that pages aren't listed more than once
    breadcrumbList = breadcrumbList.filter(remove_duplication);
    function remove_duplication(item, index) {
      const [name, path] = item;
      return name !== pageTitle;
    }; 

    // Limit to 8 items
    if (breadcrumbList.length > 8) {
      breadcrumbList.splice(0, 1);
    }
    
    // Save updated list
    localStorage.setItem("storedBreadcrumbList", JSON.stringify(breadcrumbList));

    // Display breadcrumbs
    breadcrumbList.forEach((item, index) => {
      const [name, path] = item;
      if (index == 0) {
        console.log(path);
        document.getElementById("Button1").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 1) {
        document.getElementById("Button2").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 2) {
        document.getElementById("Button3").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 3) {
        document.getElementById("Button4").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 4) {
        document.getElementById("Button5").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 5) {
        document.getElementById("Button6").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 6) {
        document.getElementById("Button7").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      } else if (index == 7) {
        document.getElementById("Button8").innerHTML = `<button type="button" class="btn btn-outline-info" onclick="location.href='${path}'">${name}</button>`;
      }
    });

    if (previousPageName != pageTitle || previousPageLog === undefined) {
      // Add current page to breadcrumb list (takes place after printing buttons so that current page doesn't display on list)
      breadcrumbList.push([pageTitle,pagePermalink]);
    };

  </script>
</body>
